services:
  clawde:
    build: .
    image: clawde:latest
    container_name: clawde
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - repo-data:/data/repo
      - bot-db:/data/db
      - bot-home:/home/bot
      - ./ssh-deploy-key:/home/bot/.ssh/id_ed25519:ro
    # /notify is bound to 127.0.0.1 inside the container; not exposed to host.
    networks:
      - bot-net

volumes:
  repo-data:
  bot-db:
  bot-home:

networks:
  bot-net:
    driver: bridge
